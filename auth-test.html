<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TYME — Auth smoke test</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 420px;
      margin: 48px auto;
      padding: 0 20px;
      background: #0f0f0f;
      color: #e8e8e8;
      line-height: 1.5;
    }
    h1 { font-size: 1.15rem; font-weight: 600; margin: 0 0 8px; }
    .muted { color: #888; font-size: 0.85rem; margin: 0 0 24px; }
    .panel {
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      background: #171717;
    }
    [hidden] { display: none !important; }
    #user-only {
      margin: 16px 0;
      padding: 16px;
      border-radius: 10px;
      background: rgba(129, 236, 255, 0.08);
      border: 1px solid rgba(129, 236, 255, 0.25);
    }
    #user-only h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; color: #81ecff; margin: 0 0 8px; }
    #user-only p { margin: 0 0 8px; font-size: 0.9rem; }
    #user-only code { font-size: 0.75rem; word-break: break-all; color: #ccc; }
    button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #252525;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #2e2e2e; }
    button.secondary {
      background: transparent;
      color: #aaa;
      border-color: #3a3a3a;
    }
    #load-status { font-size: 0.85rem; color: #b0a080; margin-bottom: 16px; }
    #error-line { color: #ff7351; font-size: 0.85rem; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Auth smoke test</h1>
  <p class="muted">Sign in → user-only block appears. Sign out → it disappears (only sign-in remains).</p>

  <p id="load-status">Connecting to Supabase…</p>
  <p id="error-line" hidden></p>

  <!-- Signed out: only this block (no user content) -->
  <div id="panel-guest" class="panel" hidden>
    <p style="margin:0 0 12px; font-size:0.9rem; color:#aaa;">Not signed in. The green “user-only” area is hidden.</p>
    <button type="button" id="btn-google">Sign in with Google</button>
  </div>

  <!-- Signed in: user-only content + sign out -->
  <div id="panel-user" class="panel" hidden>
    <p style="margin:0 0 4px; font-size:0.9rem;">Signed in as <strong id="user-label"></strong></p>
    <div id="user-only">
      <h2>User-only content</h2>
      <p>If you see this, the session is active. It must not appear after sign out.</p>
      <p>User id: <code id="user-id"></code></p>
    </div>
    <button type="button" id="btn-out" class="secondary">Sign out</button>
  </div>

  <script type="module">
    // Paste from timetracker/index.html if you use another project.
    const SUPABASE_URL = 'https://yokfokokmelomgvbedfz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlva2Zva29rbWVsb21ndmJlZGZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzY1MzEsImV4cCI6MjA5MDkxMjUzMX0.fl1Fwwwxq_u6hb6O2qqUAoBk5dkEAyYonvFTSfTNHvo';

    const loadStatus = document.getElementById('load-status');
    const errorLine = document.getElementById('error-line');
    const panelGuest = document.getElementById('panel-guest');
    const panelUser = document.getElementById('panel-user');
    const userLabel = document.getElementById('user-label');
    const userIdEl = document.getElementById('user-id');
    const btnGoogle = document.getElementById('btn-google');
    const btnOut = document.getElementById('btn-out');

    function showError(msg) {
      errorLine.textContent = msg;
      errorLine.hidden = false;
    }

    function supabaseProjectRef() {
      const m = String(SUPABASE_URL).match(/https:\/\/([a-z0-9-]+)\.supabase\.co/i);
      return m ? m[1] : null;
    }

    function clearSupabaseAuthStorage() {
      const ref = supabaseProjectRef();
      if (!ref) return;
      const prefix = `sb-${ref}-`;
      for (const storage of [localStorage, sessionStorage]) {
        try {
          for (let i = storage.length - 1; i >= 0; i--) {
            const k = storage.key(i);
            if (k && k.startsWith(prefix)) storage.removeItem(k);
          }
        } catch (_) { /* ignore */ }
      }
    }

    function stripOAuthCallbackParamsFromUrl() {
      try {
        const u = new URL(window.location.href);
        if (!u.search) return;
        const keys = ['code', 'state', 'error', 'error_description'];
        let changed = false;
        for (const k of keys) {
          if (u.searchParams.has(k)) { u.searchParams.delete(k); changed = true; }
        }
        if (!changed) return;
        const qs = u.searchParams.toString();
        window.history.replaceState({}, document.title, u.pathname + (qs ? `?${qs}` : '') + u.hash);
      } catch (_) { /* ignore */ }
    }

    function render(session) {
      errorLine.hidden = true;
      errorLine.textContent = '';
      loadStatus.textContent = 'Ready.';
      if (session?.user) {
        panelGuest.hidden = true;
        panelUser.hidden = false;
        const u = session.user;
        userLabel.textContent = u.email || u.user_metadata?.full_name || '(no email)';
        userIdEl.textContent = u.id;
      } else {
        panelUser.hidden = true;
        panelGuest.hidden = false;
        userLabel.textContent = '';
        userIdEl.textContent = '';
      }
    }

    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { detectSessionInUrl: true, flowType: 'pkce' },
    });

    let signingOut = false;

    supabase.auth.onAuthStateChange((event, session) => {
      if (signingOut && event !== 'SIGNED_OUT') return;
      if (event === 'TOKEN_REFRESHED' && session) {
        render(session);
        return;
      }
      if (event === 'SIGNED_IN' && session) {
        render(session);
        return;
      }
      if (event === 'SIGNED_OUT') {
        render(null);
      }
    });

    const { data: { session }, error: sessionError } = await supabase.auth.getSession();
    if (sessionError) {
      loadStatus.textContent = '';
      showError(sessionError.message);
      panelGuest.hidden = false;
      panelUser.hidden = true;
    } else {
      render(session);
      stripOAuthCallbackParamsFromUrl();
    }

    btnGoogle.addEventListener('click', async () => {
      errorLine.hidden = true;
      const redirectTo = window.location.origin + window.location.pathname;
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo },
      });
      if (error) showError(error.message);
    });

    btnOut.addEventListener('click', async () => {
      if (signingOut) return;
      signingOut = true;
      try {
        try {
          await Promise.race([
            supabase.auth.signOut({ scope: 'local' }),
            new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000)),
          ]);
        } catch (_) {
          /* still clear locally */
        }
        clearSupabaseAuthStorage();
        render(null);
        void supabase.auth.signOut({ scope: 'global' }).catch(() => {});
      } finally {
        signingOut = false;
      }
    });
  </script>
</body>
</html>
